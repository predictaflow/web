  <circle cx="190" cy="370" r="2" fill="#6060ff" fill-opacity="0.3"/>
  <circle cx="460" cy="440" r="1.8" fill="#6060ff" fill-opacity="0.25"/>
  <circle cx="840" cy="280" r="2.2" fill="#6060ff" fill-opacity="0.35"/>
  <circle cx="1070" cy="460" r="2" fill="#8888ff" fill-opacity="0.28"/>
  <circle cx="1370" cy="370" r="2.5" fill="#6060ff" fill-opacity="0.3"/>
  <circle cx="580" cy="310" r="1.5" fill="#8888ff" fill-opacity="0.2"/>
  <circle cx="1150" cy="330" r="2" fill="#6060ff" fill-opacity="0.25"/>

  <!-- Conexiones -->
  <line x1="190" y1="370" x2="380" y2="350" stroke="#6060ff" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="460" y1="440" x2="380" y2="350" stroke="#6060ff" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="840" y1="280" x2="980" y2="390" stroke="#6060ff" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="1150" y1="330" x2="1320" y2="195" stroke="#8888ff" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="840" y1="280" x2="700" y2="160" stroke="#6060ff" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Etiquetas -->
  <text x="398" y="338" font-size="8" fill="#6060ff" fill-opacity="0.25" font-family="monospace">+340%</text>
  <text x="718" y="148" font-size="8" fill="#6060ff" fill-opacity="0.30" font-family="monospace">↑ trending</text>
  <text x="998" y="378" font-size="8" fill="#8888ff" fill-opacity="0.22" font-family="monospace">peak</text>
  <text x="1338" y="183" font-size="8" fill="#8888ff" fill-opacity="0.22" font-family="monospace">+180%</text>
  <text x="958" y="60" font-size="8" fill="#6060ff" fill-opacity="0.25" font-family="monospace">signal detected</text>
</svg>
