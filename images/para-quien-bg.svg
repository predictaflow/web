<svg viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-blue" cx="25%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6060ff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6060ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue2" cx="78%" cy="62%" r="42%">
      <stop offset="0%" stop-color="#4343FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4343FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo oscuro base — azul marino puro -->
  <rect width="1440" height="600" fill="#0a0a28"/>

  <!-- Glows azules únicamente -->
  <rect width="1440" height="600" fill="url(#glow-blue)"/>
  <rect width="1440" height="600" fill="url(#glow-blue2)"/>

  <!-- Grid horizontal -->
  <line x1="0" y1="120" x2="1440" y2="120" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="0" y1="240" x2="1440" y2="240" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="0" y1="360" x2="1440" y2="360" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="0" y1="480" x2="1440" y2="480" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Grid vertical -->
  <line x1="180" y1="0" x2="180" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>
  <line x1="360" y1="0" x2="360" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>
  <line x1="540" y1="0" x2="540" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>
  <line x1="720" y1="0" x2="720" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>
  <line x1="900" y1="0" x2="900" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>
  <line x1="1080" y1="0" x2="1080" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>
  <line x1="1260" y1="0" x2="1260" y2="600" stroke="#6060ff" stroke-width="0.4" stroke-opacity="0.05"/>

  <!-- Línea de tendencia 1 — azul, sube hacia la derecha -->
  <path d="M 80,520 C 180,490 260,420 380,350 C 500,280 580,210 700,160 C 790,120 860,95 940,72"
        fill="none" stroke="#6060ff" stroke-width="1.8" stroke-opacity="0.40"/>
  <circle cx="380" cy="350" r="3.5" fill="#6060ff" fill-opacity="0.55"/>
  <circle cx="700" cy="160" r="4.5" fill="#6060ff" fill-opacity="0.75"/>
  <circle cx="940" cy="72" r="5.5" fill="#6060ff" fill-opacity="0.9"/>

  <!-- Línea de tendencia 2 — azul claro, área derecha -->
  <path d="M 640,560 C 760,520 840,460 980,390 C 1100,325 1200,255 1320,195 C 1380,165 1420,145 1440,132"
        fill="none" stroke="#8888ff" stroke-width="1.8" stroke-opacity="0.22"/>
  <circle cx="980" cy="390" r="3.5" fill="#8888ff" fill-opacity="0.40"/>
  <circle cx="1320" cy="195" r="4.5" fill="#8888ff" fill-opacity="0.55"/>

  <!-- Línea sutil de profundidad -->
  <path d="M 300,580 C 450,540 600,480 750,420 C 900,360 1050,300 1200,255 C 1300,225 1380,210 1440,200"
