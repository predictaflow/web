  <circle cx="380" cy="560" r="2" fill="#F7E19B" opacity="0.25"/>
  <circle cx="410" cy="590" r="4" fill="#D4B6A4" opacity="0.15"/>
  <circle cx="620" cy="640" r="3" fill="#F7E19B" opacity="0.2"/>
