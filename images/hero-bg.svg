    <text x="20" y="158" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="11">❤️ 4.821</text>
    <text x="90" y="158" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="11">💬 312</text>
    <text x="155" y="158" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="11">↗ 1.204</text>

