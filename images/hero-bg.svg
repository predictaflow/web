    <!-- Data points -->
    <circle cx="280" cy="170" r="4" fill="#D4B6A4" filter="url(#glow)"/>
    <circle cx="400" cy="120" r="4" fill="#D4B6A4" filter="url(#glow)"/>
    <circle cx="520" cy="55" r="5" fill="#F7E19B" filter="url(#glow)"/>
    <circle cx="640" cy="20" r="5" fill="#D4B6A4" filter="url(#glow)"/>

    <!-- Spike annotation -->
    <line x1="520" y1="55" x2="520" y2="340" stroke="rgba(247,225,155,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="470" y="8" width="110" height="28" rx="6" fill="rgba(247,225,155,0.15)" stroke="rgba(247,225,155,0.3)" stroke-width="1"/>
    <text x="525" y="26" fill="#F7E19B" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">+847% reach</text>

    <!-- X axis labels -->
