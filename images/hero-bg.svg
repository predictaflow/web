<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" width="1440" height="720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d06;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2010;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B6A4;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#D4B6A4;stop-opacity:0.02" />
    </linearGradient>
    <linearGradient id="chartGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7E19B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#F7E19B;stop-opacity:0.02" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="720" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#D4B6A4" stroke-width="1">
    <line x1="0" y1="144" x2="1440" y2="144"/>
    <line x1="0" y1="288" x2="1440" y2="288"/>
    <line x1="0" y1="432" x2="1440" y2="432"/>
    <line x1="0" y1="576" x2="1440" y2="576"/>
    <line x1="180" y1="0" x2="180" y2="720"/>
    <line x1="360" y1="0" x2="360" y2="720"/>
    <line x1="540" y1="0" x2="540" y2="720"/>
    <line x1="720" y1="0" x2="720" y2="720"/>
    <line x1="900" y1="0" x2="900" y2="720"/>
    <line x1="1080" y1="0" x2="1080" y2="720"/>
    <line x1="1260" y1="0" x2="1260" y2="720"/>
  </g>

  <!-- ── MAIN TREND CURVE ── -->
  <!-- Area fill -->
  <path d="M 0,680 C 100,660 200,630 320,580 C 440,530 500,510 600,460 C 700,410 780,380 880,310 C 980,240 1060,190 1160,130 C 1260,70 1360,40 1440,20 L1440,720 L0,720 Z"
    fill="url(#chartGrad)" opacity="0.8"/>

  <!-- Secondary curve fill -->
  <path d="M 0,720 C 150,700 300,680 450,650 C 600,620 720,590 880,555 C 1040,520 1200,490 1440,460 L1440,720 Z"
    fill="url(#chartGrad2)" opacity="0.4"/>

  <!-- Main curve line -->
  <path d="M 0,680 C 100,660 200,630 320,580 C 440,530 500,510 600,460 C 700,410 780,380 880,310 C 980,240 1060,190 1160,130 C 1260,70 1360,40 1440,20"
    fill="none" stroke="#D4B6A4" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Secondary dashed curve -->
  <path d="M 0,720 C 150,700 300,680 450,650 C 600,620 720,590 880,555 C 1040,520 1200,490 1440,460"
    fill="none" stroke="#F7E19B" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="8,5" opacity="0.35"/>

  <!-- ── DATA POINTS on main curve ── -->
  <circle cx="320" cy="580" r="5" fill="#D4B6A4" opacity="0.6"/>
  <circle cx="600" cy="460" r="5" fill="#D4B6A4" opacity="0.7"/>
  <circle cx="880" cy="310" r="6" fill="#D4B6A4" filter="url(#glow)" opacity="0.85"/>
  <circle cx="1160" cy="130" r="7" fill="#F7E19B" filter="url(#glow)"/>
  <circle cx="1440" cy="20" r="6" fill="#D4B6A4" filter="url(#glow)" opacity="0.9"/>

  <!-- ── SPIKE ANNOTATION at 1160 ── -->
  <line x1="1160" y1="130" x2="1160" y2="480" stroke="rgba(247,225,155,0.12)" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="1090" y="80" width="145" height="32" rx="8" fill="rgba(247,225,155,0.12)" stroke="rgba(247,225,155,0.35)" stroke-width="1"/>
  <text x="1162" y="100" fill="#F7E19B" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">+847% reach</text>

  <!-- ── CHART HEADER (top right) ── -->
  <text x="820" y="72" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="11" letter-spacing="2.5">TENDENCIA · ÚLTIMAS 12 SEMANAS</text>
  <circle cx="1390" cy="67" r="4" fill="#4ade80" opacity="0.75"/>
  <text x="1400" y="72" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="11">EN VIVO</text>

  <!-- ── X AXIS LABELS ── -->
  <text x="120"  y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 1</text>
  <text x="320"  y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 3</text>
  <text x="540"  y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 5</text>
  <text x="740"  y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 7</text>
  <text x="940"  y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 9</text>
  <text x="1130" y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 11</text>
  <text x="1350" y="700" fill="rgba(255,255,255,0.18)" font-family="sans-serif" font-size="10">Sem 12</text>

  <!-- ── METRIC PILLS (floating along the curve) ── -->
  <!-- Alcance -->
  <rect x="820" y="280" width="130" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(212,182,164,0.2)" stroke-width="1"/>
  <text x="836" y="302" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="9" letter-spacing="1.5">ALCANCE</text>
  <text x="836" y="325" fill="#D4B6A4" font-family="sans-serif" font-size="22" font-weight="bold">2.4M</text>
  <text x="900" y="325" fill="#4ade80" font-family="sans-serif" font-size="10">▲ 12%</text>

  <!-- Engagement -->
  <rect x="1060" y="180" width="140" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(247,225,155,0.2)" stroke-width="1"/>
  <text x="1076" y="202" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="9" letter-spacing="1.5">ENGAGEMENT</text>
  <text x="1076" y="225" fill="#F7E19B" font-family="sans-serif" font-size="22" font-weight="bold">8.7%</text>
  <text x="1136" y="225" fill="#4ade80" font-family="sans-serif" font-size="10">▲ 3.2%</text>

  <!-- Viral score -->
  <rect x="1290" y="100" width="120" height="52" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(212,182,164,0.2)" stroke-width="1"/>
  <text x="1306" y="122" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="9" letter-spacing="1.5">VIRAL SCORE</text>
  <text x="1306" y="145" fill="#D4B6A4" font-family="sans-serif" font-size="22" font-weight="bold">94</text>
  <text x="1338" y="145" fill="#F7E19B" font-family="sans-serif" font-size="11">★ Top 5%</text>

  <!-- ── DECORATIVE GLOW at peak ── -->
  <circle cx="1160" cy="130" r="40" fill="rgba(247,225,155,0.04)" filter="url(#softglow)"/>
  <circle cx="1440" cy="20"  r="30" fill="rgba(212,182,164,0.05)" filter="url(#softglow)"/>
</svg>
