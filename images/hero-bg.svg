<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" width="1440" height="720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d06;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2010;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B6A4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D4B6A4;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="chartGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7E19B;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#F7E19B;stop-opacity:0.02" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="720" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.06" stroke="#D4B6A4" stroke-width="1">
