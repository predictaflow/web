    <text x="160" y="358" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="9">Sem 4</text>
    <text x="280" y="358" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="9">Sem 6</text>
    <text x="400" y="358" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="9">Sem 8</text>
    <text x="520" y="358" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="9">Sem 10</text>
    <text x="620" y="358" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="9">Sem 12</text>
