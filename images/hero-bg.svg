    <text x="650" y="34" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="10">EN VIVO</text>

    <!-- Area chart fill -->
    <path d="M40,300 C80,290 120,270 160,240 C200,210 240,200 280,170 C320,140 360,150 400,120 C440,90 480,80 520,55 C560,30 600,40 640,20 L640,340 L40,340 Z"
      fill="url(#chartGrad)" opacity="0.7"/>

    <!-- Chart line main -->
    <path d="M40,300 C80,290 120,270 160,240 C200,210 240,200 280,170 C320,140 360,150 400,120 C440,90 480,80 520,55 C560,30 600,40 640,20"
