    <rect x="40" y="10" width="14" height="50" rx="3" fill="#F7E19B"/>
    <rect x="60" y="30" width="14" height="30" rx="3" fill="#D4B6A4"/>
    <rect x="80" y="15" width="14" height="45" rx="3" fill="#D4B6A4"/>
    <rect x="100" y="5" width="14" height="55" rx="3" fill="#F7E19B"/>
    <rect x="120" y="20" width="14" height="40" rx="3" fill="#D4B6A4"/>
